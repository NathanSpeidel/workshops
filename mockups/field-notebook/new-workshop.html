<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Workshop — Field Notebook</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="new-workshop">
<header class="topnav">
  <div class="wordmark">Workshop Manager</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="upcoming.html">Upcoming</a>
    <a href="new-workshop.html" class="active">New Workshop</a>
    <a href="my-workshops.html">My Workshops</a>
  </nav>
</header>
<main class="page">
  <div class="page-head">
    <h1>New Workshop</h1>
    <p class="date-line" id="topbar-date"></p>
  </div>

  <div class="success-banner" id="success-banner" style="display:none"></div>

  <form id="new-workshop-form">
    <div class="form-field">
      <label for="field-service">Service</label>
      <select id="field-service" required></select>
    </div>
    <div class="form-field">
      <label for="field-school">School</label>
      <select id="field-school" required></select>
    </div>
    <div class="form-field">
      <label for="field-location">Location</label>
      <input id="field-location" type="text" required>
    </div>
    <div class="form-field">
      <label for="field-date">Date</label>
      <input id="field-date" type="date" required>
    </div>
    <div class="form-field">
      <label for="field-time">Time</label>
      <input id="field-time" type="time" required>
    </div>
    <div class="form-field">
      <label for="field-classroom">Classroom</label>
      <input id="field-classroom" type="text" placeholder="e.g. Room 12B" required>
    </div>
    <div class="form-field">
      <label>Facilitators</label>
      <div class="checkbox-list" id="employee-checkboxes"></div>
    </div>
    <button type="submit" class="btn">Create workshop</button>
  </form>
</main>
<footer class="site-footer">
  <a href="../index.html">&larr; All styles</a>
  <button id="reset-demo">Reset demo data</button>
</footer>
<script src="../shared/data.js"></script>
<script src="../shared/helpers.js"></script>
<script src="app.js"></script>
</body>
</html>
